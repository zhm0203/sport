        body {

            background: #F8FAFC;
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        .gradient-primary {
            background: linear-gradient(135deg, #22C55E 0%, #4ADE80 100%);
        }
        
        .gradient-secondary {
            background: linear-gradient(135deg, #EAB308 0%, #FACC15 100%);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #E2E8F0;
        }
        
        .card-active {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.15);
            border: 2px solid #22C55E;
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #22C55E, #4ADE80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-slideUp {
            animation: slideUp 0.3s ease-out forwards;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-pulse-slow {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes like {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .animate-like {
            animation: like 0.3s ease-out;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 2px;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .avatar-ring {
            background: linear-gradient(135deg, #22C55E, #4ADE80);
            padding: 2px;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #22C55E, #4ADE80);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
    </style>

        // Main Render
        function render() {
            let content = '';

            switch (currentTab) {
                case 'home':
                    content = renderHomePage();
                    break;
                case 'circle':
                    content = renderCirclePage();
                    break;
                case 'buddy':
                    content = renderBuddyPage();
                    break;
                case 'exchange':
                    content = renderExchangePage();
                    break;
                case 'profile':
                    content = renderProfilePage();
                    break;
                default:
                    content = renderHomePage();
            }

            document.getElementById('app').innerHTML = content + renderNav();
            window.scrollTo(0, 0);
        }

        function navigateTo(tab) {
            currentTab = tab;
            render();
        }

        function updatePostContent(value) {
            newPostContent = value;
        }

        function createPost() {
            if (!newPostContent.trim()) return;

            const newPost = {
                id: 'post_' + Date.now(),
                user: { nickname: currentUser.nickname, avatar: currentUser.avatar, level: currentUser.level },
                content: newPostContent,
                images: ['📸'],
                sportType: '运动',
                likes: 0,
                comments: 0,
                time: '刚刚',
                liked: false
            };

            posts = [newPost, ...posts];
            newPostContent = '';
            render();
        }

        function toggleLike(postId) {
            posts = posts.map(post => {
                if (post.id === postId) {
                    return {
                        ...post,
                        liked: !post.liked,
                        likes: post.liked ? post.likes - 1 : post.likes + 1
                    };
                }
                return post;
            });
            render();
        }

        // EXP Animation
        setInterval(() => {
            if (userExp < currentUser.nextLevelExp) {
                userExp += Math.floor(Math.random() * 2);
                if (userExp >= currentUser.nextLevelExp) {
                    userExp = currentUser.nextLevelExp;
                }
            }
        }, 3000);

        // Initial render
        render();
    </script>
</body>
</html>
